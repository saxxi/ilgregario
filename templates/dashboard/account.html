{% extends "base.html" %}
{% block title %}Il mio account — IlGregario{% endblock %}
{% block content %}

<div class="max-w-md mx-auto">
  <a href="/users/{{ session.username }}"
    class="inline-flex items-center gap-1 text-sm text-base-content/50 hover:text-base-content mb-6 transition-colors">
    ← La mia squadra
  </a>

  <h1 class="text-2xl font-black mb-6">Il mio account</h1>

  {% if error %}
  <div class="alert alert-error mb-4">{{ error }}</div>
  {% endif %}
  {% if success %}
  <div class="alert alert-success mb-4">{{ success }}</div>
  {% endif %}

  <form method="post" action="/account"
    class="bg-base-100 border border-base-200 rounded-2xl shadow-sm p-6 flex flex-col gap-5">
    <input type="hidden" name="csrf_token" value="{{ csrf_token(session.user_id) }}">

    <div class="form-control">
      <label class="label"><span class="label-text font-semibold">Nome utente</span></label>
      <input type="text" name="username" value="{{ session.username }}" required class="input input-bordered w-full">
    </div>

    <div class="divider text-xs text-base-content/50">Cambia password (opzionale)</div>

    <div class="form-control">
      <label class="label"><span class="label-text font-semibold">Nuova password</span></label>
      <input type="password" name="new_password" class="input input-bordered w-full"
        placeholder="Lascia vuoto per non cambiare">
    </div>

    <div class="form-control">
      <label class="label"><span class="label-text font-semibold">Conferma nuova password</span></label>
      <input type="password" name="confirm_password" class="input input-bordered w-full">
    </div>

    <div class="divider text-xs text-base-content/50">Conferma identità</div>

    <div class="form-control">
      <label class="label"><span class="label-text font-semibold">Password attuale <span
            class="text-error">*</span></span></label>
      <input type="password" name="current_password" required class="input input-bordered w-full">
    </div>

    <button type="submit" class="btn btn-primary w-full">Salva modifiche</button>

  </form>
</div>

{% endblock %}
