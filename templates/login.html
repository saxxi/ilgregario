{% extends "base.html" %}
{% block title %}Login — IlGregario{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto mt-16">
  <div class="card bg-base-100 shadow">
    <div class="card-body">
      <h2 class="card-title mb-2">Accedi</h2>
      {% if error %}
      <div class="alert alert-error text-sm mb-2">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login" class="space-y-4">
        <label class="form-control w-full">
          <div class="label"><span class="label-text">Username</span></div>
          <input type="text" name="username" required autofocus class="input input-bordered w-full">
        </label>
        <label class="form-control w-full">
          <div class="label"><span class="label-text">Password</span></div>
          <input type="password" name="password" required class="input input-bordered w-full">
        </label>
        <button type="submit" class="btn btn-primary w-full">Entra</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
